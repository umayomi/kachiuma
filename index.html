<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>カチウマ — 価値馬を、期待値で。</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ground:#12211A; --ground-2:#1B2E24; --ground-edge:rgba(255,255,255,.08);
    --paper:#F5F2E9; --paper-2:#ECE7D8;
    --ink:#16201A; --ink-soft:#5A6B60; --ink-faint:#8A968D;
    --turf:#46B17C; --turf-deep:#2E8A5E;
    --vermil:#D2674E; --gold:#CBA14A;
    --line:rgba(20,33,26,.12);
    --r:14px; --maxw:560px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--ground);
    color:var(--paper);
    font-family:"Noto Sans JP",system-ui,sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 32px);
  }
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 16px}
  .num{font-family:"Oswald",sans-serif;font-variant-numeric:tabular-nums;letter-spacing:.01em}

  /* ---- header ---- */
  header{padding:26px 0 18px}
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand h1{font-family:"Oswald";font-weight:700;font-size:30px;letter-spacing:.04em;margin:0}
  .brand .ja{font-weight:700;font-size:20px;letter-spacing:.06em}
  .thesis{color:var(--turf);font-weight:500;font-size:13px;letter-spacing:.08em;margin-top:2px}
  .meta-row{margin-top:16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .pill{font-size:12px;border:1px solid var(--ground-edge);border-radius:999px;padding:4px 11px;color:var(--paper-2)}
  .pill.live{color:var(--turf);border-color:rgba(70,177,124,.4)}
  .race-title{font-weight:700;font-size:18px;margin:14px 0 2px}
  .race-sub{color:var(--ink-faint);font-size:13px}

  .value-note{font-size:12.5px;color:var(--paper-2);background:var(--ground-2);
    border:1px solid var(--ground-edge);border-radius:10px;padding:10px 12px;margin:13px 0 0}
  /* ---- legend (the "わかる" key) ---- */
  .legend{background:var(--ground-2);border:1px solid var(--ground-edge);border-radius:var(--r);
    padding:13px 14px;margin:16px 0;font-size:12.5px;color:var(--paper-2)}
  .legend b{color:var(--paper)}
  .legend .k{display:flex;gap:8px;align-items:flex-start;margin-top:7px}
  .swatch{width:13px;height:13px;border-radius:3px;flex:0 0 auto;margin-top:3px}
  .swatch.p{background:var(--turf)} .swatch.q{background:transparent;border:2px dashed var(--paper-2)}

  /* ---- race nav (全レース切替) ---- */
  .race-nav{display:flex;gap:7px;overflow-x:auto;padding:2px 0 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .race-nav::-webkit-scrollbar{display:none}
  .chip-race{flex:0 0 auto;font-family:"Oswald";font-size:13px;letter-spacing:.02em;color:var(--paper-2);
    background:var(--ground-2);border:1px solid var(--ground-edge);border-radius:999px;padding:7px 13px;cursor:pointer;white-space:nowrap}
  .chip-race.on{background:var(--gold);color:#1a1a17;border-color:var(--gold);font-weight:600}

  /* ---- horse cards ---- */
  .horse{background:var(--paper);color:var(--ink);border-radius:var(--r);
    padding:14px 14px 12px;margin:11px 0;box-shadow:0 1px 0 rgba(0,0,0,.25)}
  .horse.value{box-shadow:0 0 0 2px var(--gold), 0 6px 18px rgba(203,161,74,.18)}
  .h-top{display:flex;align-items:center;gap:11px}
  .umaban{font-family:"Oswald";font-weight:700;font-size:17px;width:30px;height:30px;flex:0 0 auto;
    display:grid;place-items:center;border-radius:7px;background:var(--ink);color:var(--paper)}
  .mark{font-size:20px;width:24px;text-align:center;flex:0 0 auto}
  .mark.gold{color:var(--gold)} 
  .name-wrap{flex:1;min-width:0}
  .name{font-weight:700;font-size:15.5px;line-height:1.3}
  .jockey{font-size:12px;color:var(--ink-soft)}
  .odds{text-align:right;flex:0 0 auto}
  .odds .o{font-family:"Oswald";font-weight:600;font-size:18px}
  .odds .pop{font-size:11px;color:var(--ink-soft)}

  /* ---- the signature: value meter ---- */
  .meter{margin:12px 0 2px}
  .meter-head{display:flex;justify-content:space-between;align-items:baseline;font-size:11.5px;color:var(--ink-soft)}
  .ev{font-family:"Oswald";font-weight:700;font-size:19px}
  .ev.plus{color:var(--turf-deep)} .ev.minus{color:var(--vermil)}
  .track{position:relative;height:26px;background:var(--paper-2);border-radius:7px;margin-top:6px;overflow:hidden}
  .bar-p{position:absolute;left:0;top:0;bottom:0;background:var(--turf);border-radius:7px 0 0 7px;
    transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .bar-p.minus{background:var(--vermil)}
  .qline{position:absolute;top:-3px;bottom:-3px;width:0;border-left:2px dashed var(--ink);opacity:.55}
  .qtag{position:absolute;top:-16px;transform:translateX(-50%);font-size:10px;color:var(--ink-soft);white-space:nowrap}
  .pct{position:absolute;top:50%;transform:translateY(-50%);font-family:"Oswald";font-weight:600;
    font-size:12px;color:#fff;left:7px;text-shadow:0 1px 1px rgba(0,0,0,.25)}
  .edge{font-size:11.5px;margin-top:9px}
  .edge.plus{color:var(--turf-deep)} .edge.minus{color:var(--ink-soft)}

  .reasons{list-style:none;margin:9px 0 0;padding:0}
  .reasons li{font-size:12.5px;color:var(--ink);padding-left:15px;position:relative;margin-top:4px}
  .reasons li::before{content:"";position:absolute;left:2px;top:9px;width:5px;height:5px;
    border-radius:50%;background:var(--turf-deep)}

  /* ---- tickets ---- */
  .tickets{background:var(--ground-2);border:1px solid var(--ground-edge);border-radius:var(--r);padding:14px;margin:18px 0}
  .tickets h2{font-size:14px;margin:0 0 4px;letter-spacing:.04em}
  .tickets .sub{font-size:12px;color:var(--ink-faint);margin-bottom:10px}
  .ticket{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--ground-edge)}
  .ticket:first-of-type{border-top:0}
  .t-type{font-size:12px;background:var(--turf-deep);color:#fff;border-radius:6px;padding:3px 9px;flex:0 0 auto}
  .t-target{font-family:"Oswald";font-weight:600;font-size:16px;flex:1}
  .t-ev{font-family:"Oswald";font-weight:700;color:var(--turf)}
  .t-note{font-size:11px;color:var(--ink-faint);width:100%;padding-left:0;margin-top:-2px}

  /* ---- footer ---- */
  footer{margin-top:24px;font-size:11.5px;color:var(--ink-faint);text-align:center;line-height:1.8}
  .disclaim{background:var(--ground-2);border:1px solid var(--ground-edge);border-radius:var(--r);
    padding:12px 14px;font-size:11.5px;color:var(--paper-2);margin-top:16px}
  .loading{padding:50px 0;text-align:center;color:var(--ink-faint)}
  a{color:var(--turf)}
  :focus-visible{outline:2px solid var(--turf);outline-offset:2px;border-radius:4px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1>KACHIUMA</h1><span class="ja">カチウマ</span>
    </div>
    <div class="thesis">価値馬を、期待値で。</div>
    <div id="raceNav" class="race-nav"></div>
    <div class="meta-row" id="meta"></div>
    <div class="race-title" id="raceTitle"></div>
    <div class="race-sub" id="raceSub"></div>
    <div class="value-note" id="valueNote" style="display:none"></div>
  </header>

  <div class="legend">
    <b>メーターの読み方</b>
    <div class="k"><span class="swatch p"></span><span><b>緑のバー＝推定勝率(p)</b>。カチウマが見積もる「来る確率」。</span></div>
    <div class="k"><span class="swatch q"></span><span><b>点線＝市場想定勝率(q)</b>。オッズから逆算した確率。</span></div>
    <div class="k"><span class="swatch" style="background:var(--gold)"></span><span><b>緑が点線を超える＝妙味(edge)</b>。市場より高く評価＝買える根拠。<b>期待値(EV)＞1.0</b>が理論上プラス。</span></div>
  </div>

  <div id="horses"><div class="loading">読み込み中…</div></div>
  <div id="tickets"></div>

  <div class="disclaim">
    馬券の<b>購入は手動</b>で行ってください（このツールは分析のみ）。期待値はあくまで判断材料で、的中を保証しません。控除率（約20〜30%）があり、継続してプラスにするのは簡単ではありません。<b>馬券は20歳になってから。</b>
  </div>
  <footer>カチウマ — 個人用・分析専用 / データ: netkeiba（個人利用）</footer>
</div>

<script>
const P = { idx:"/data/predictions/index.json", dir:"/data/predictions/",
            sIdx:"/data/sample/index.json", sDir:"/data/sample/" };
let DIR = null, RACES = [], IS_SAMPLE = false;

async function getJSON(url){ const r = await fetch(url,{cache:"no-store"}); if(!r.ok) throw 0; return r.json(); }

async function load(){
  let dir = P.dir, idx;
  try { idx = await getJSON(P.idx); }
  catch { dir = P.sDir; idx = await getJSON(P.sIdx); IS_SAMPLE = true; } // 本番が無ければサンプル
  DIR = dir;
  RACES = idx.races || [];
  if(!RACES.length){ document.getElementById("horses").innerHTML = "<div class='loading'>レースがありません</div>"; return; }
  renderNav();
  selectRace(RACES[0].race_id);
}

function renderNav(){
  document.getElementById("raceNav").innerHTML = RACES.map(r =>
    `<button class="chip-race" data-id="${r.race_id}" onclick="selectRace('${r.race_id}')">${esc(r.track||"")}${r.race_no}R</button>`
  ).join("");
}

async function selectRace(rid){
  document.querySelectorAll(".chip-race").forEach(b => b.classList.toggle("on", b.dataset.id === rid));
  const chip = document.querySelector(`.chip-race[data-id='${rid}']`);
  if(chip) chip.scrollIntoView({inline:"center", block:"nearest"});
  document.getElementById("horses").innerHTML = "<div class='loading'>読み込み中…</div>";
  try { renderRace(await getJSON(DIR + rid + ".json")); }
  catch { document.getElementById("horses").innerHTML = "<div class='loading'>このレースを読み込めませんでした</div>"; }
}

function renderRace(race){
  document.getElementById("meta").innerHTML =
    `<span class="pill live">● 更新 ${fmtTime(race.updated_at)}</span>` +
    `<span class="pill">${race.track} ${race.race_no}R</span>` +
    `<span class="pill">${race.surface} ${race.distance_m}m</span>` +
    `<span class="pill">馬場 ${race.going}</span>` +
    (IS_SAMPLE ? `<span class="pill" style="color:var(--gold);border-color:rgba(203,161,74,.4)">SAMPLE</span>` : "");
  document.getElementById("raceTitle").textContent = race.race_name;
  document.getElementById("raceSub").textContent =
    `${race.date} ・ ${race.horses.length}頭 ・ 妙味(EV>1) ${race.horses.filter(h=>h.ev_win>1).length}頭`;
  const vn = document.getElementById("valueNote");
  vn.textContent = race.value_note || "";
  vn.style.display = race.value_note ? "block" : "none";
  const maxScale = Math.max(...race.horses.map(h=>Math.max(h.p_win,h.q_win)), 0.4);
  document.getElementById("horses").innerHTML = race.horses
    .slice().sort((a,b)=> (b.ev_win||0)-(a.ev_win||0))
    .map(h=>card(h, maxScale)).join("");
  renderTickets(race.tickets);
}

function card(h, scale){
  const plus = h.ev_win > 1.0;
  const pW = Math.min(100, (h.p_win/scale)*100);
  const qW = Math.min(100, (h.q_win/scale)*100);
  const edgePt = (h.edge*100).toFixed(1);
  const isValue = plus;
  return `
  <div class="horse ${isValue?'value':''}">
    <div class="h-top">
      <div class="umaban num">${h.umaban}</div>
      <div class="mark ${h.mark==='◎'?'gold':''}">${h.mark||""}</div>
      <div class="name-wrap">
        <div class="name">${esc(h.name)}</div>
        <div class="jockey">${esc(h.jockey||"")}</div>
      </div>
      <div class="odds">
        <div class="o num">${h.odds_win?.toFixed(1) ?? "-"}</div>
        <div class="pop">${h.popularity?h.popularity+"番人気":""}</div>
      </div>
    </div>
    <div class="meter">
      <div class="meter-head">
        <span>推定勝率 <b class="num">${(h.p_win*100).toFixed(1)}%</b> ／ 市場 <b class="num">${(h.q_win*100).toFixed(1)}%</b></span>
        <span class="ev num ${plus?'plus':'minus'}">EV ${h.ev_win?.toFixed(2)}</span>
      </div>
      <div class="track">
        <div class="bar-p ${plus?'':'minus'}" style="width:${pW}%"></div>
        <div class="qtag" style="left:${qW}%">市場 q</div>
        <div class="qline" style="left:${qW}%"></div>
        <div class="pct num">${(h.p_win*100).toFixed(0)}%</div>
      </div>
      <div class="edge ${h.edge>0?'plus':'minus'}">
        ${h.edge>0?`妙味 +${edgePt}pt（市場より高評価）`:`妙味 ${edgePt}pt`}
      </div>
    </div>
    ${h.reasons?.length?`<ul class="reasons">${h.reasons.map(r=>`<li>${esc(r)}</li>`).join("")}</ul>`:""}
  </div>`;
}

function renderTickets(tickets){
  const el = document.getElementById("tickets");
  if(!tickets || !tickets.length){ el.innerHTML=""; return; }
  el.innerHTML = `<div class="tickets">
    <h2>買い目候補（EVベース）</h2>
    <div class="sub">期待値が1.0を超える馬・組合せ。最終判断と購入はご自身で。</div>
    ${tickets.map(t=>`
      <div class="ticket">
        <span class="t-type">${esc(t.type)}</span>
        <span class="t-target num">${esc(t.target)}</span>
        <span class="t-ev num">EV ${(t.ev??0).toFixed(2)}</span>
        ${t.note?`<span class="t-note">${esc(t.note)}</span>`:""}
      </div>`).join("")}
  </div>`;
}

const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmtTime = s => { try{ const d=new Date(s); return d.toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});}catch{return s;} };

load().catch(()=>{ document.getElementById("horses").innerHTML="<div class='loading'>データを読み込めませんでした</div>"; });
</script>
</body>
</html>
