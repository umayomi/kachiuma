name: collect-and-analyze

on:
  schedule:
    - cron: "30 22 * * 5,6"
  workflow_dispatch:
    inputs:
      date:
        description: "対象日 (YYYYMMDD)。空なら今日(JST)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt selenium

      - name: Resolve target date (JST)
        id: d
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(TZ=Asia/Tokyo date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect (raw -> data/raw, 非コミット)
        run: python scraper/collect.py --date "${{ steps.d.outputs.date }}"

      - name: Enrich (career_score+騎手 -> 各馬 ability_prob)
        run: python analysis/enrich.py --in data/raw --budget-min 70

      - name: Analyze (raw -> data/predictions)
        run: python analysis/predict.py --in data/raw --out data/predictions

      - name: Commit predictions + cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/predictions data/horsedb_cache.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "data: 予想更新 ${{ steps.d.outputs.date }}"
            git push
          fi
