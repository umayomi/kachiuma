name: debug
on:
  workflow_dispatch:
    inputs:
      date:
        description: "レース開催日 YYYYMMDD"
        required: true
        default: "20260531"
      race_id:
        description: "race_id（直接指定）"
        required: true
        default: "202605021211"
jobs:
  dbg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: verify jockey name-match & thinness for a race
        run: |
          python - << 'PY'
          import sys, requests
          sys.path += ["scraper", "analysis"]
          import netkeiba as nk, jockey_db as J

          ds = "${{ github.event.inputs.date }}"
          rid = "${{ github.event.inputs.race_id }}"
          race = nk.parse_result(nk.get(f"{nk.BASE_RACE}/race/result.html?race_id={rid}"), rid)
          place = race.get("track"); surf = race.get("surface"); dist = race.get("distance_m")
          print(f"対象: {race.get('race_name')} / {place} {surf}{dist}")
          s, e = J.period_3y(ds)
          print(f"集計期間: {s} 〜 {e}\n")

          sess = requests.Session()
          place_tbl = J.fetch(sess, surf, dist, ds, place=place)   # 場×距離
          all_tbl = J.fetch(sess, surf, dist, ds, place="ALL")     # 全場×距離
          print(f"テーブル: 場×距離={len(place_tbl)}騎手 / 全場×距離={len(all_tbl)}騎手\n")

          print(f"{'騎手(結果)':<12}{'状態':<12}{'戦':>4}{'複勝率':>8}{'縮小':>7}")
          miss = 0
          for h in race["horses"]:
              jk = h.get("jockey")
              if not jk:
                  continue
              cell, src = J.resolve(place_tbl, all_tbl, jk)
              if not cell:
                  miss += 1
                  hits = [k for k in all_tbl if J._norm_name(jk)[:2] in k][:3]
                  print(f"{jk:<12}{'該当なし':<12}  近い表記候補: {hits}")
                  continue
              r = J.rate(cell)
              print(f"{jk:<12}{src:<12}{cell['starts']:>4}{cell['place_rate']*100:>7.1f}%{r*100:>6.1f}%")
          print(f"\n名前該当なし: {miss}頭 / {sum(1 for h in race['horses'] if h.get('jockey'))}頭")
          print("（該当なしが多い＝名前マッチング要調整。0〜1頭なら配線OK）")
          PY
