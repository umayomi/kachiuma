name: dbg
on:
  workflow_dispatch:
    inputs:
      date:
        description: "確認する開催日 YYYYMMDD"
        required: true
        default: "20260620"
permissions:
  contents: read
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: 出馬表parseで race_class / direction が入るか確認
        run: |
          python - << 'PY'
          import sys
          sys.path += ["scraper", "analysis"]
          import netkeiba as nk

          date = "${{ github.event.inputs.date }}"
          ids = nk.find_race_ids(date)
          print(f"{date}: race_id {len(ids)}件\n")

          ok_cls = ok_dir = ok_go = 0
          rows = []
          for rid in ids:
              try:
                  odds = nk.get_win_odds(rid)
                  html = nk.get(f"{nk.BASE_RACE}/race/shutuba.html?race_id={rid}")
                  r = nk.parse_shutuba(html, rid, odds_map=odds)
              except Exception as e:
                  print("parse失敗", rid, str(e)[:50]); continue
              rc, cl, dr = r.get("race_class"), r.get("class_label"), r.get("direction")
              sf, di, go = r.get("surface"), r.get("distance_m"), r.get("going")
              if rc is not None: ok_cls += 1
              if dr is not None: ok_dir += 1
              if go is not None: ok_go += 1
              rows.append(f"  {rid}  {r.get('track')}{r.get('race_no'):>2}R {sf}{di} {go}"
                          f"  race_class={rc}({cl})  direction={dr}  馬{len(r.get('horses',[]))}頭")

          n = len(rows)
          print(f"=== race_class 取得: {ok_cls}/{n}R  /  direction: {ok_dir}/{n}R  /  馬場: {ok_go}/{n}R ===\n")
          print("\n".join(rows))
          if ok_cls == 0 and n:
              print("\n!! race_class が全レースNone → _parse_class のセレクタ(.RaceData02)が現HTMLと不一致の可能性")
          elif ok_cls < n:
              print(f"\n!! {n-ok_cls}R で race_class=None（特定条件だけ滑っている可能性）")
          else:
              print("\nOK: 全レースで race_class 取得成功 → 実力スコアは本番でフル稼働できる")
          PY
