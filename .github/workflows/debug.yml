name: debug
on:
  workflow_dispatch:
    inputs:
      surface:
        description: "芝 or ダ"
        required: true
        default: "芝"
      distance:
        description: "距離(m)"
        required: true
        default: "2400"
      race_date:
        description: "基準日 YYYYMMDD（この前日まで3年で集計）"
        required: true
        default: "20260531"
      jockeys:
        description: "確認したい騎手(カンマ区切り)"
        required: true
        default: "ルメール,川田,岩田康誠,武豊"
jobs:
  dbg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install requests beautifulsoup4 lxml
      - name: real POST jockey stats (same-distance, 3y, all-venue)
        run: |
          python - << 'PY'
          import sys, requests
          sys.path += ["analysis"]
          import jockey_db as J

          surf = "${{ github.event.inputs.surface }}"
          dist = int("${{ github.event.inputs.distance }}")
          ds = "${{ github.event.inputs.race_date }}"
          names = [s.strip() for s in "${{ github.event.inputs.jockeys }}".split(",") if s.strip()]

          s, e = J.period_3y(ds)
          print(f"集計期間: {s} 〜 {e} / {surf}{dist} / 全場")
          sess = requests.Session()
          tbl = J.fetch(sess, names[0], surf, dist, ds)
          print(f"テーブル取得: {len(tbl)}騎手\n")

          print(f"{'騎手':<10}{'出走':>5}{'複勝率':>8}{'縮小後':>8}")
          for nm in names:
              key = J._norm_name(nm)
              cell = tbl.get(key)
              if not cell:
                  # 部分一致も試す（表記ゆれ確認）
                  hit = [k for k in tbl if key in k or k in key]
                  print(f"{nm:<10}  該当なし（近い表記: {hit[:3]}）")
                  continue
              r = J.rate(cell)
              print(f"{nm:<10}{cell['starts']:>5}{cell['place_rate']*100:>7.1f}%{r*100:>7.1f}%")

          print("\n--- テーブル先頭5騎手（名前の出方を確認） ---")
          for i, (k, v) in enumerate(list(tbl.items())[:5]):
              print(f"  {k!r}: 出走{v['starts']} 複勝{v['place_rate']}")
          PY
