name: debug
on:
  workflow_dispatch:
    inputs:
      horse_ids:
        description: "馬IDをカンマ区切りで（数頭で検証）"
        required: true
        default: "2021101414,2022101683,2022103991"
jobs:
  dbg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install selenium beautifulsoup4 lxml
      - name: parse real db.netkeiba horse pages
        run: |
          python - << 'PY'
          import sys, time
          sys.path += ["scraper"]
          import horsedb as hd

          ids = [s.strip() for s in "${{ github.event.inputs.horse_ids }}".split(",") if s.strip()]
          driver = hd.make_driver()
          try:
              for hid in ids:
                  career = hd.fetch_horse(driver, hid, wait=5.0)
                  print(f"\n===== 馬 {hid}: 過去走 {len(career)} 件 =====")
                  for r in career[:3]:
                      print(f"  {r['date']} {r['race_name'][:18]:<18} "
                            f"格={r['race_class']}({r['class_label']}) "
                            f"{r['surface']}{r['distance_m']} {r['going']} "
                            f"着={r['finish_pos']} 着差={r['margin']} "
                            f"指数={r['speed_index']} 上り={r['agari']} 人気={r['popularity']}")
                  # 値の充足ぐあい（欠損の多さを把握）
                  n = len(career) or 1
                  spd = sum(1 for r in career if r['speed_index'] is not None)
                  cls = sum(1 for r in career if r['race_class'] is not None)
                  mgn = sum(1 for r in career if r['margin'] is not None)
                  print(f"  充足: クラス {cls}/{len(career)} / 着差 {mgn}/{len(career)} / タイム指数 {spd}/{len(career)}")
                  time.sleep(3)
          finally:
              driver.quit()
          print("\n検証おわり")
          PY
