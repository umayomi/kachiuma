name: dbg
on:
  workflow_dispatch:
    inputs:
      race_ids:
        description: "確認する race_id をカンマ区切りで（滑ったレース）"
        required: true
        default: "202605030508,202605030512,202609030508"
permissions:
  contents: read
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: RaceData01/02/RaceName の生HTMLを出す
        run: |
          python - << 'PY'
          import sys, re
          sys.path += ["scraper", "analysis"]
          import netkeiba as nk
          from bs4 import BeautifulSoup

          ids = [x.strip() for x in "${{ github.event.inputs.race_ids }}".split(",") if x.strip()]
          for rid in ids:
              print("=" * 60)
              print("race_id:", rid)
              try:
                  html = nk.get(f"{nk.BASE_RACE}/race/shutuba.html?race_id={rid}")
              except Exception as e:
                  print("取得失敗", str(e)[:60]); continue
              soup = BeautifulSoup(html, "lxml")
              for sel in [".RaceName", ".RaceData01", ".RaceData02"]:
                  el = soup.select_one(sel)
                  print(f"\n--- {sel} ---")
                  if el is None:
                      print("  (要素なし: セレクタが現HTMLと不一致)")
                      continue
                  txt = re.sub(r"\s+", " ", el.get_text(" ", strip=True))
                  print("  text :", txt)
                  # RaceData02 は span ごとに分けて見たい
                  if sel == ".RaceData02":
                      spans = [re.sub(r"\s+", " ", s.get_text(strip=True)) for s in el.select("span")]
                      print("  spans:", spans)
                  # RaceName 内のアイコンclassも（グレード判定用）
                  if sel == ".RaceName":
                      classes = []
                      for e in el.find_all(True):
                          classes += e.get("class", [])
                      print("  icon-classes:", sorted(set(classes)))
              # 参考: 現行parseの結果
              try:
                  r = nk.parse_shutuba(html, rid, odds_map={})
                  print("\n  → 現行parse: race_class=", r.get("race_class"),
                        "class_label=", r.get("class_label"),
                        "going=", r.get("going"), "surface=", r.get("surface"),
                        "distance=", r.get("distance_m"))
              except Exception as e:
                  print("  parse失敗", str(e)[:60])
          PY
