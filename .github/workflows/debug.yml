name: debug-shutuba
on: workflow_dispatch
jobs:
  dbg:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests beautifulsoup4 lxml
      - name: inspect
        run: |
          python - << 'PY'
          import requests
          from bs4 import BeautifulSoup
          ua = {"User-Agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"}
          rid = "202602010211"
          h = requests.get(f"https://race.netkeiba.com/race/shutuba_past.html?race_id={rid}", headers=ua, timeout=20).text
          soup = BeautifulSoup(h, "lxml")
          row = soup.select_one("tr.HorseList")
          pasts = row.select("td.Past")
          print("Past cells:", len(pasts))
          p = pasts[0]
          print("TEXT:", p.get_text("|", strip=True)[:260])
          print("--- child elems ---")
          for c in p.select("div,span")[:14]:
              t = c.get_text(" ", strip=True)
              if t:
                  print(c.get("class"), "|", t[:22])
          PY
