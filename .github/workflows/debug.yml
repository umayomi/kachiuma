name: debug-shutuba
on: workflow_dispatch
jobs:
  dbg:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests beautifulsoup4 lxml
      - name: inspect
        run: |
          python - << 'PY'
          import requests
          from bs4 import BeautifulSoup
          ua = {"User-Agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"}
          rid = "202602010211"
          h = requests.get(f"https://race.netkeiba.com/race/shutuba_past.html?race_id={rid}", headers=ua, timeout=20).text
          soup = BeautifulSoup(h, "lxml")
          p = soup.select_one("tr.HorseList").select_one("td.Past")
          print("Past class:", p.get("class"))
          for el in p.find_all(True):
              print(el.name, el.get("class"), "=", el.get_text(" ", strip=True)[:14])
          PY
