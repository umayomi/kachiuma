name: debug-shutuba
on: workflow_dispatch
jobs:
  dbg:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests beautifulsoup4 lxml
      - name: inspect
        run: |
          python - << 'PY'
          import requests
          from bs4 import BeautifulSoup
          rid = "202602010211"
          ua = {"User-Agent":"Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15"}
          html = requests.get(f"https://race.netkeiba.com/race/shutuba.html?race_id={rid}", headers=ua, timeout=20).text
          soup = BeautifulSoup(html, "lxml")
          row = soup.select_one("tr.HorseList")
          for i, td in enumerate(row.select("td")):
              print(i, td.get("class"), "|", td.get_text(strip=True)[:18])
          a = row.select_one("a[href*='/horse/']")
          print("NAMELINK", a.get("class") if a else None, "|", (a.get_text(strip=True) if a else None))
          PY
