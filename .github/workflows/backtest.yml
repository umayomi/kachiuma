name: backtest
on:
  workflow_dispatch:
    inputs:
      start:
        description: "開始日 YYYYMMDD（例 20260613）"
        required: true
      end:
        description: "終了日 YYYYMMDD（空なら開始日のみ）"
        required: false
        default: ""
permissions:
  contents: write
jobs:
  bt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: collect (result + 馬柱) & backtest
        run: |
          python - << 'PY'
          import sys, datetime, pathlib, copy
          sys.path += ["scraper", "analysis"]
          import netkeiba as nk, pastrun, backtest
          start = "${{ github.event.inputs.start }}"
          end = "${{ github.event.inputs.end }}".strip() or start
          d0 = datetime.datetime.strptime(start, "%Y%m%d").date()
          d1 = datetime.datetime.strptime(end, "%Y%m%d").date()
          races, day = [], d0
          while day <= d1:
              ds = day.strftime("%Y%m%d")
              ids = nk.find_race_ids(ds)
              print(f"{ds}: {len(ids)} races")
              for rid in ids:
                  try:
                      r = nk.parse_result(nk.get(f"{nk.BASE_RACE}/race/result.html?race_id={rid}"), rid)
                      if not any(h.get("finish_pos") == 1 for h in r["horses"]):
                          continue
                      try:
                          past = pastrun.parse_shutuba_past(
                              nk.get(f"{nk.BASE_RACE}/race/shutuba_past.html?race_id={rid}"))
                          by = {}
                          for x in past:
                              feat = pastrun.features(x, r.get("distance_m"), r.get("surface"), today=day)
                              by[x["umaban"]] = (feat, pastrun.form_score(feat))
                          for h in r["horses"]:
                              ent = by.get(h["umaban"])
                              if ent:
                                  h["features"], h["form_score"] = ent
                      except Exception as e:
                          print("past skip", rid, e)
                      races.append(r)
                  except Exception as e:
                      print("skip", rid, e)
              day += datetime.timedelta(days=1)
          print(f"\n検証対象レース: {len(races)}\n")
          rep_form = backtest.report(backtest.run(copy.deepcopy(races)))
          for r in races:
              for h in r["horses"]:
                  h.pop("form_score", None)
                  h.pop("features", None)
          rep_odds = backtest.report(backtest.run(races))
          out = ("# カチウマ バックテスト結果\n\n"
                 f"対象期間: {start} 〜 {end}\n\n"
                 "## オッズ＋実力（現行モデル）\n```\n" + rep_form + "\n```\n\n"
                 "## オッズのみ（実力無視・基準）\n```\n" + rep_odds + "\n```\n")
          print(out)
          pathlib.Path("data").mkdir(exist_ok=True)
          pathlib.Path("data/backtest_report.md").write_text(out, encoding="utf-8")
          PY
      - name: commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/backtest_report.md
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "backtest: レポート更新(実力あり/なし)"
            git push
          fi
